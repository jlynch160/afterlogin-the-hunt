<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5a4470"/><stop offset=".5" stop-color="#8a5e58"/><stop offset="1" stop-color="#d99a55"/></linearGradient>
<radialGradient id="winlight" cx="50%" cy="40%" r="55%"><stop offset="0" stop-color="#ffe9b0" stop-opacity=".95"/><stop offset="1" stop-color="#ffce7a" stop-opacity=".25"/></radialGradient>
<linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7a4a3a"/><stop offset="1" stop-color="#3c2018"/></linearGradient>
<filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
</defs>
<rect width="1600" height="900" fill="url(#sky)"/>
<!-- dusk windows -->
<g>
<rect x="180" y="120" width="190" height="330" rx="95" fill="url(#winlight)" opacity=".85"/>
<rect x="705" y="80" width="190" height="370" rx="95" fill="url(#winlight)"/>
<rect x="1230" y="120" width="190" height="330" rx="95" fill="url(#winlight)" opacity=".85"/>
<g stroke="#9a6a48" stroke-width="9"><line x1="275" y1="120" x2="275" y2="450"/><line x1="800" y1="80" x2="800" y2="450"/><line x1="1325" y1="120" x2="1325" y2="450"/><line x1="180" y1="290" x2="370" y2="290"/><line x1="705" y1="265" x2="895" y2="265"/><line x1="1230" y1="290" x2="1420" y2="290"/></g>
</g>
<!-- light shafts -->
<polygon points="705,90 895,90 1080,900 540,900" fill="#ffdf9a" opacity=".18" filter="url(#soft)"/>
<!-- machine silhouettes -->
<g fill="#5e3a2e" opacity=".92">
<rect x="60" y="480" width="240" height="280" rx="40"/><rect x="120" y="420" width="60" height="80" rx="22"/><circle cx="180" cy="560" r="42" fill="#7a4a38"/>
<rect x="1300" y="480" width="240" height="280" rx="40"/><rect x="1420" y="420" width="60" height="80" rx="22"/><circle cx="1420" cy="560" r="42" fill="#7a4a38"/>
<rect x="380" y="560" width="160" height="190" rx="30"/><rect x="1060" y="560" width="160" height="190" rx="30"/>
</g>
<!-- pipes -->
<g fill="none" stroke="#6a4434" stroke-width="22" stroke-linecap="round" opacity=".85">
<path d="M300 500 Q420 430 540 500"/><path d="M1060 500 Q1180 430 1300 500"/>
</g>
<!-- conveyor -->
<rect x="280" y="690" width="1040" height="36" rx="18" fill="#4c2c20"/>
<g fill="#6e4430"><circle cx="360" cy="708" r="11"/><circle cx="520" cy="708" r="11"/><circle cx="680" cy="708" r="11"/><circle cx="840" cy="708" r="11"/><circle cx="1000" cy="708" r="11"/><circle cx="1160" cy="708" r="11"/><circle cx="1280" cy="708" r="11"/></g>
<!-- floor -->
<rect y="726" width="1600" height="174" fill="url(#floor)"/>
<ellipse cx="800" cy="790" rx="470" ry="58" fill="#2e1812" opacity=".85"/>
<ellipse cx="800" cy="782" rx="340" ry="40" fill="none" stroke="#ffce7a" stroke-width="2.5" opacity=".5" stroke-dasharray="6 14"/>
<!-- floating dust -->
<g fill="#ffe9b0" opacity=".6"><circle cx="500" cy="300" r="3"/><circle cx="950" cy="240" r="2.5"/><circle cx="1180" cy="380" r="2"/><circle cx="350" cy="380" r="2"/><circle cx="760" cy="180" r="2"/></g>
<!-- warm haze -->
<ellipse cx="800" cy="880" rx="900" ry="110" fill="#ffb86a" opacity=".2" filter="url(#soft)"/>
</svg>
